name: AMRC Daily AI Update

on:
  workflow_dispatch:

jobs:
  update-market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install requests

      - name: Update Market Data
        run: |
          python fetch_market.py
