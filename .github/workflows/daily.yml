name: AMRC Daily AI Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  update-market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AI Report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python ai_report.py

      - name: Commit market.json
        run: |
          git config --global user.name "AMRC AI"
          git config --global user.email "ai@amrc.com"
          git add market.json
          git commit -m "Update AI market report" || exit 0
          git push
