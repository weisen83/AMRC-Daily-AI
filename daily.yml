
name: AMRC Daily AI Update

on:
  schedule:
    - cron: "0 1 * * *"

  workflow_dispatch:


jobs:
  update-market:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Install packages
      run: |
        pip install requests

    - name: Update Market Data
      run: |
        python fetch_market.py


    - name: Commit update
      run: |
        git config --global user.name "AMRC AI"
        git config --global user.email "ai@amrc.com"

        git add market.json

        git commit -m "Daily market update" || exit 0

        git push
